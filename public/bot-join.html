<!DOCTYPE html>
<html>
<head>
  <title>Bot Join Space</title>
  <style>
    body { font-family: Georgia, serif; max-width: 600px; margin: 50px auto; padding: 20px; background: #f9f9f9; }
    .box { padding: 20px; margin: 20px 0; border-radius: 8px; background: white; }
    .error { border-left: 4px solid #ef4444; }
    .success { border-left: 4px solid #10b981; }
    .loading { border-left: 4px solid #3b82f6; }
    button { background: #000; color: white; padding: 12px 24px; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; }
    button:hover { background: #333; }
    button:disabled { background: #ccc; cursor: not-allowed; }
    input { width: 100%; padding: 10px; margin: 10px 0; font-family: monospace; border: 1px solid #ddd; border-radius: 4px; }
    pre { background: #f1f1f1; padding: 10px; overflow-x: auto; font-size: 11px; border-radius: 4px; }
    .logs { margin-top: 20px; }
    .logs p { margin: 5px 0; font-size: 14px; }
  </style>
</head>
<body>
  <h1>🤖 Bot Join Space</h1>
  <p>Join bot to Towns Space #23 using ethers.js + Towns SDK</p>
  
  <div class="box">
    <label><strong>Bot Private Key:</strong></label>
    <input type="password" id="key" placeholder="0x..." />
    <small style="color: #666;">Stays in your browser, never sent anywhere</small>
  </div>
  
  <button id="joinBtn">Join Space Now</button>
  
  <div id="output"></div>
  <div id="logs" class="logs"></div>

  <script type="module">
    import { ethers } from 'https://esm.sh/ethers@5.7.2';
    import { JoinSpace, townsEnv } from 'https://esm.sh/@towns-protocol/sdk';

    const SPACE_ID = '23';
    const RPC_URL = 'https://base-mainnet.g.alchemy.com/v2/w8-f4Y2PxFDqBK33ltv9s';

    function log(msg, color = '#666') {
      const p = document.createElement('p');
      p.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
      p.style.color = color;
      document.getElementById('logs').appendChild(p);
      console.log(msg);
    }

    console.log('✅ Module loaded - button should work');

    document.getElementById('joinBtn').onclick = async function() {
      const output = document.getElementById('output');
      const logsDiv = document.getElementById('logs');
      const btn = document.getElementById('joinBtn');
      const key = document.getElementById('key').value.trim();
      
      if (!key.startsWith('0x')) {
        alert('Enter private key starting with 0x');
        return;
      }
      
      btn.disabled = true;
      logsDiv.innerHTML = '';
      output.innerHTML = '<div class="box loading"><strong>Status:</strong> Starting join process...</div>';
      
      try {
        log('✅ ethers.js loaded (ESM)', '#10b981');
        log('✅ Towns SDK loaded (ESM)', '#10b981');
        
        output.innerHTML = '<div class="box loading"><strong>Status:</strong> Creating wallet...</div>';
        log('🔐 Creating bot wallet...');
        
        const provider = new ethers.providers.StaticJsonRpcProvider(RPC_URL, {
          chainId: 8453,
          name: 'base'
        });
        
        const wallet = new ethers.Wallet(key, provider);
        log(`✅ Bot wallet: ${wallet.address}`, '#10b981');
        
        output.innerHTML = '<div class="box loading"><strong>Status:</strong> Checking balance...</div>';
        const balance = await provider.getBalance(wallet.address);
        const balanceEth = ethers.utils.formatEther(balance);
        log(`💰 Balance: ${balanceEth} ETH`);
        
        if (balance.eq(0)) {
          throw new Error('Bot has no ETH for gas fees');
        }
        
        output.innerHTML = '<div class="box loading"><strong>Status:</strong> Configuring Towns...</div>';
        log('📝 Creating Towns config...');
        
        const TOWNS_CONFIG = townsEnv().makeTownsConfig('omega', {
          rpcUrl: RPC_URL,
        });
        
        log('✅ Towns config created', '#10b981');
        
        output.innerHTML = '<div class="box loading"><strong>Status:</strong> Joining space (30-90 seconds)...</div>';
        log('🚀 Calling JoinSpace...');
        log(`   Space ID: ${SPACE_ID}`);
        log('   This will mint the membership NFT...');
        log('   Please wait...');
        
        const result = await JoinSpace({
          spaceId: SPACE_ID,
          signer: wallet,
          townsConfig: TOWNS_CONFIG,
          skipMintMembership: false,
        });
        
        log('✅ JOIN SUCCESSFUL!', '#10b981');
        log(`Result: ${JSON.stringify(result, null, 2)}`);
        
        output.innerHTML = `
          <div class="box success">
            <h3>✅ Bot Joined Successfully!</h3>
            <p><strong>Bot Address:</strong> <code>${wallet.address}</code></p>
            <p><strong>Space ID:</strong> ${SPACE_ID}</p>
            <details>
              <summary>Show result details</summary>
              <pre>${JSON.stringify(result, null, 2)}</pre>
            </details>
            <p style="margin-top: 20px;">
              <a href="https://basescan.org/address/${wallet.address}" target="_blank" style="color: #000;">View on BaseScan →</a>
            </p>
            <p style="margin-top: 10px; color: #666;">
              <strong>Next:</strong> Check if bot appears in Towns space member list!
            </p>
          </div>
        `;
        
        btn.disabled = false;
        
      } catch (error) {
        log(`❌ Error: ${error.message}`, '#ef4444');
        console.error('Full error:', error);
        
        output.innerHTML = `
          <div class="box error">
            <h3>❌ Join Failed</h3>
            <p><strong>Error:</strong> ${error.message}</p>
            <details>
              <summary>Show error details</summary>
              <pre>${error.stack || JSON.stringify(error, null, 2)}</pre>
            </details>
          </div>
        `;
        
        btn.disabled = false;
      }
    };
  </script>
</body>
</html>
